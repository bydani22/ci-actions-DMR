name: CI DMR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    name: PHP ${{ matrix:php-version }}

    steps:
      - name: Descarregar codi
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix:php-version }}
          extensions: mbstring, xml
          coverage: none

      - name: Instal·lar dependències
        run: composer install --no-progress --prefer-dist --ignore-platform-reqs

      - name: Executar tests amb PHPUnit
        run: ./vendor/bin/phpunit --log-junit resultats.xml

      - name: Pujar informe de resultats (Artefacte)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultats-DMR
          path: resultats.xml